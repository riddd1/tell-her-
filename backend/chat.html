<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tell Her · Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root{--bg:#08080a;--pink:#f72585;--card:#101013;--txt:#f5f5f7;--sub:#888893;--nav:#0a0a0d}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
.phone-frame{width:100%;max-width:390px;height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
@media(min-width:480px){.phone-frame{max-height:844px;border-radius:44px;box-shadow:0 0 0 2px #1c1c1e,0 40px 100px rgba(0,0,0,.98)}}
.status-bar{height:44px;background:var(--nav);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
.sb-time{font-size:.76rem;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif}
.sb-right{display:flex;align-items:center;gap:5px}
@media(max-width:479px){.status-bar{display:none}.cl-nav{padding-top:calc(.6rem + env(safe-area-inset-top))!important}}
.cl-nav{background:var(--nav);display:flex;align-items:center;gap:10px;padding:.6rem 1rem;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.cl-tester-av{width:38px;height:38px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.cl-info{flex:1;min-width:0;text-align:center}
.cl-name{font-size:.9rem;font-weight:600;color:#fff}
.cl-status-row{display:flex;align-items:center;justify-content:center;gap:4px}
.cl-online-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.cl-status{font-size:.68rem;color:var(--sub)}
.cl-nav-right{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);flex-shrink:0}
.cl-msgs{flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:var(--bg)}
.cl-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px}
.cl-row.me{flex-direction:row-reverse}
.cl-row>div{max-width:72%}
.cl-bubble{padding:10px 14px;font-size:.9rem;line-height:1.5;word-break:break-word}
.cl-bubble.img-bubble{padding:0;background:transparent!important;border-radius:12px;overflow:hidden}
.cl-row.them .cl-bubble{background:#1c1c1e;color:#fff;border-radius:18px 18px 18px 4px}
.cl-row.me .cl-bubble{background:var(--pink);color:#fff;border-radius:18px 18px 4px 18px}
.cl-time{font-size:.6rem;color:var(--sub);margin-top:3px;padding:0 2px}
.cl-row.me .cl-time{text-align:right}
.cl-av-sm{width:26px;height:26px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;color:#fff;font-weight:600;align-self:flex-end;margin-bottom:18px}
.cl-av-sm.hidden{visibility:hidden}
.cl-empty{text-align:center;padding:3rem 1rem;color:var(--sub);font-size:.85rem}
.cl-typing{display:flex;gap:3px;padding:10px 14px;background:#1c1c1e;border-radius:18px 18px 18px 4px;width:fit-content}
.cl-typing span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);animation:td .8s ease-in-out infinite}
.cl-typing span:nth-child(2){animation-delay:.15s}
.cl-typing span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{opacity:.3;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
.cl-bar{background:var(--nav);border-top:1px solid rgba(255,255,255,.05);padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom));display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.cl-input-wrap{flex:1;background:#1c1c1e;border-radius:22px;padding:9px 14px;display:flex;align-items:flex-end;gap:8px;transition:border .2s;border:1.5px solid transparent}
.cl-input-wrap:focus-within{border-color:rgba(247,37,133,.3)}
.cl-input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:16px;font-family:'DM Sans',sans-serif;resize:none;max-height:100px;min-height:22px;line-height:1.45;padding:0}
.cl-input::placeholder{color:var(--sub)}
.cl-send{width:32px;height:32px;border-radius:50%;background:var(--pink);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s,transform .1s}
.cl-send:active{opacity:.82;transform:scale(.9)}
.cl-send:disabled{opacity:.3}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="sb-time" id="chat-status-time">9:41</span>
    <div class="sb-right">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><rect x="0" y="4" width="2.5" height="7" rx=".7" fill="white" opacity=".4"/><rect x="3.5" y="2.5" width="2.5" height="8.5" rx=".7" fill="white" opacity=".6"/><rect x="7" y="1" width="2.5" height="10" rx=".7" fill="white" opacity=".8"/><rect x="10.5" y="0" width="2.5" height="11" rx=".7" fill="white"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none"><path d="M7.5 3C9.5 3 11.3 3.8 12.6 5.1" stroke="white" stroke-width="1.4" stroke-linecap="round"/><path d="M7.5 5.5C8.8 5.5 9.9 6 10.7 6.8" stroke="white" stroke-width="1.4" stroke-linecap="round"/><path d="M7.5 8C8.1 8 8.7 8.3 9.1 8.7" stroke="white" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="10.5" r="1" fill="white"/></svg>
      <span style="font-size:.68rem;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600">100%</span>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="2.5" stroke="white" stroke-opacity=".4"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="white"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="white" opacity=".4"/></svg>
    </div>
  </div>
  <div class="cl-nav">
    <div style="width:36px"></div>
    <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:center">
      <div class="cl-tester-av">🌸</div>
      <div class="cl-info">
        <div class="cl-name">Emily</div>
        <div class="cl-status-row"><span class="cl-online-dot"></span><span class="cl-status">online</span></div>
      </div>
    </div>
    <div class="cl-nav-right"><i data-lucide="video" style="width:18px;height:18px"></i></div>
  </div>
  <div class="cl-msgs" id="cl-msgs"><div class="cl-empty"><div class="cl-typing"><span></span><span></span><span></span></div></div></div>
  <div class="cl-bar">
    <label for="cl-img-input" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.4);flex-shrink:0">
      <i data-lucide="image" style="width:18px;height:18px"></i>
    </label>
    <input type="file" id="cl-img-input" accept="image/*" style="display:none" onchange="handleChatImageUpload(event)">
    <div class="cl-input-wrap">
      <textarea class="cl-input" id="cl-input" placeholder="Message" rows="1" oninput="autoResizeLive(this)" onkeydown="handleLiveKey(event)"></textarea>
    </div>
    <button class="cl-send" id="cl-send" onclick="sendLiveMsg()"><i data-lucide="arrow-up" style="width:16px;height:16px"></i></button>
  </div>
</div>
<script>
const API_BASE='https://telr-tests-production.up.railway.app';
const TESTER={id:'emily',emoji:'🌸',name:'Emily'};
let chatPollTimer=null;

function getUserId(){
  const urlParams=new URLSearchParams(window.location.search);
  const uidFromUrl=urlParams.get('uid');
  if(uidFromUrl){localStorage.setItem('tellher_uid',uidFromUrl);return uidFromUrl;}
  let id=localStorage.getItem('tellher_uid');
  if(!id){id='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);localStorage.setItem('tellher_uid',id);}
  return id;
}

function updateStatusTime(){
  const el=document.getElementById('chat-status-time');
  if(!el)return;
  const now=new Date();let h=now.getHours()%12||12;
  const m=now.getMinutes().toString().padStart(2,'0');
  el.textContent=h+':'+m;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderLiveMsgs(msgs){
  const area=document.getElementById('cl-msgs');
  if(!msgs.length){area.innerHTML=`<div class="cl-empty">Say hi to ${escH(TESTER.name)} to get started</div>`;return}
  area.innerHTML=msgs.map((m,i)=>{
    const isMe=m.role==='user';
    const time=new Date(m.timestamp).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const isImg=m.type==='image';
    const content=isImg?`<img src="${escH(m.content)}" style="max-width:200px;width:100%;display:block;cursor:pointer;border-radius:12px" onclick="window.open('${escH(m.content)}')">`:escH(m.content).replace(/\n/g,'<br>');
    const isFirst=i===0||msgs[i-1].role!==m.role;
    const showAv=!isMe&&isFirst;
    return`<div class="cl-row ${isMe?'me':'them'} ${isFirst?'first':''}">${!isMe?`<div class="cl-av-sm ${showAv?'':'hidden'}">${escH(TESTER.emoji)}</div>`:''}<div><div class="cl-bubble${isImg?' img-bubble':''}">${content}</div><div class="cl-time">${time}</div></div></div>`;
  }).join('');
  area.scrollTop=area.scrollHeight;
}

async function loadLiveMsgs(){
  const userId=getUserId();
  try{
    const res=await fetch(`${API_BASE}/messages/${TESTER.id}/${userId}`);
    if(!res.ok)throw new Error();
    const data=await res.json();
    renderLiveMsgs(data.messages||[]);
  }catch(_){
    const area=document.getElementById('cl-msgs');
    if(area.querySelector('.cl-typing')){area.innerHTML=`<div class="cl-empty">Say hi to ${TESTER.name} to get started</div>`;}
  }
}

async function sendLiveMsg(){
  const input=document.getElementById('cl-input');
  const text=input.value.trim();
  if(!text)return;
  const btn=document.getElementById('cl-send');
  btn.disabled=true;input.value='';input.style.height='';
  const userId=getUserId();
  const area=document.getElementById('cl-msgs');
  const empty=area.querySelector('.cl-empty');if(empty)empty.remove();
  const tempEl=document.createElement('div');
  tempEl.className='cl-row me first';
  const time=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  tempEl.innerHTML=`<div><div class="cl-bubble">${escH(text).replace(/\n/g,'<br>')}</div><div class="cl-time">${time}</div></div>`;
  area.appendChild(tempEl);area.scrollTop=area.scrollHeight;
  try{
    await fetch(`${API_BASE}/messages/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,testerId:TESTER.id,content:text,type:'text'})});
    await loadLiveMsgs();
  }catch(_){}
  btn.disabled=false;
}

function handleLiveKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendLiveMsg();}}
function autoResizeLive(el){el.style.height='';el.style.height=Math.min(el.scrollHeight,100)+'px';}

async function handleChatImageUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const base64=ev.target.result.split(',')[1];
    try{
      const uploadRes=await fetch(`${API_BASE}/upload-image`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base64Image:base64})});
      const uploadData=await uploadRes.json();
      if(uploadData.url){
        const userId=getUserId();
        await fetch(`${API_BASE}/messages/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,testerId:TESTER.id,content:uploadData.url,type:'image'})});
        await loadLiveMsgs();
      }
    }catch(err){console.error('Image upload failed:',err);}
  };
  reader.readAsDataURL(file);e.target.value='';
}

document.addEventListener('DOMContentLoaded',()=>{
  lucide.createIcons();
  updateStatusTime();
  setInterval(updateStatusTime,30000);
  loadLiveMsgs();
  chatPollTimer=setInterval(loadLiveMsgs,5000);
});
</script>
</body>
</html>
